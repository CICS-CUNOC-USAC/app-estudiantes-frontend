name: Build Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build Nuxt application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt application
        run: npm run build
